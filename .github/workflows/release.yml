name: Validate Repository

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate skills structure
        run: |
          echo "Checking skills..."
          find skills -name "SKILL.md" | while read skill_file; do
            if ! head -1 "$skill_file" | grep -q "^---$"; then
              echo "ERROR: Missing YAML frontmatter in $skill_file"
              exit 1
            fi
            if ! grep -q "^name:" "$skill_file"; then
              echo "ERROR: Missing 'name' in $skill_file"
              exit 1
            fi
            if ! grep -q "^description:" "$skill_file"; then
              echo "ERROR: Missing 'description' in $skill_file"
              exit 1
            fi
            skill_name=$(grep -m1 "^name:" "$skill_file" | sed 's/^name: *//')
            echo "OK: $skill_name"
          done

      - name: Validate Cursor rules
        run: |
          if [ -d ".cursor/rules" ]; then
            echo "Checking Cursor rules..."
            find .cursor/rules -name "*.mdc" | while read rule_file; do
              if ! head -1 "$rule_file" | grep -q "^---$"; then
                echo "ERROR: Missing YAML frontmatter in $rule_file"
                exit 1
              fi
              if ! grep -q "^description:" "$rule_file"; then
                echo "ERROR: Missing 'description' in $rule_file"
                exit 1
              fi
              if ! grep -q "^alwaysApply:" "$rule_file"; then
                echo "ERROR: Missing 'alwaysApply' in $rule_file"
                exit 1
              fi
              rule_name=$(basename "$rule_file" .mdc)
              echo "OK: $rule_name"
            done
          else
            echo "No .cursor/rules/ directory found"
          fi

      - name: Run validation script
        run: |
          chmod +x scripts/validate-marketplace.sh
          ./scripts/validate-marketplace.sh

      - name: Summary
        run: |
          echo "=== Repository Summary ==="
          echo "Skills: $(find skills -name "SKILL.md" | wc -l)"
          if [ -d ".cursor/rules" ]; then
            echo "Rules: $(find .cursor/rules -name "*.mdc" | wc -l)"
          else
            echo "Rules: 0"
          fi
